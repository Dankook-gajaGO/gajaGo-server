version: '3.8' # 도커 컴포즈 버전
services:
  # 스프링 서버 설정
  spring-server:
    build: ./gazago
    ports:
      - "8080:8080" # 외부에서 8080으로 접속 가능
    env_file:
      - .env
    depends_on: [python-server]
    environment:
      - JWT_SECRET=${JWT_SECRET}

  # 파이썬 서버 설정
  python-server:
    build: ./gazagopy
    ports:
      - "8000:8000" # 외부에서 8000으로 접속 가능
    env_file:
      - .env